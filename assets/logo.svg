<svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- H letterform -->
  <rect x="0" y="0" width="7" height="28" rx="1.5" fill="var(--logo-h-color, #1A241C)"/>
  <rect x="21" y="0" width="7" height="28" rx="1.5" fill="var(--logo-h-color, #1A241C)"/>
  <rect x="0" y="10.5" width="28" height="5" rx="1.5" fill="var(--logo-h-color, #1A241C)"/>
  <!-- Trend line: enters bottom-left, exits top-right through crossbar -->
  <line x1="-4" y1="30" x2="10" y2="16" stroke="#40A040" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="10" x2="32" y2="-1" stroke="#40A040" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead open style -->
  <path d="M27 -3L33 -1L31 5" fill="none" stroke="#40A040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny leaf at arrow tip -->
  <ellipse cx="34" cy="-2" rx="5" ry="2.5" fill="#40A040" transform="rotate(-45 34 -2)" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="40" y="21" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="var(--logo-text-color, #1A241C)">halin</text>
</svg>
